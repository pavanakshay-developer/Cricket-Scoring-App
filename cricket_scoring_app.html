<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Cricket Scorer - Team Edition</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #22c55e; --error: #ef4444; --warn: #f59e0b; --info: #3b82f6; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
       .container { max-width: 600px; margin: auto; }
       .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
       .hidden { display: none!important; }
        input, textarea, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
       .btn-primary { background: var(--accent); color: #000; width: 100%; font-size: 1.1rem; }
       .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
       .btn-run { background: #334155; color: white; }
       .btn-extra { background: var(--info); color: white; }
       .btn-wicket { background: var(--error); color: white; grid-column: span 2; }
       .btn-action { background: var(--warn); color: #000; font-size: 0.8rem; }
       .score-box { text-align: center; }
       .score-big { font-size: 3rem; font-weight: 800; color: var(--accent); line-height: 1; }
       .history { max-height: 150px; overflow-y: auto; background: #000; padding: 8px; border-radius: 6px; font-family: monospace; font-size: 0.85rem; margin-top: 10px; }
       .ball-entry { border-bottom: 1px solid #1e293b; padding: 4px 0; display: flex; justify-content: space-between; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 10px; }
        th { color: #94a3b8; text-align: left; border-bottom: 1px solid #334155; padding-bottom: 4px; }
       .striker-row { background: rgba(34, 197, 94, 0.1); border-left: 3px solid var(--accent); }
    </style>
</head>
<body>
    <div id="setup-screen" class="container">
        <div class="card">
            <h2>Match Setup</h2>
            <label>Team 1 (Batting First)</label>
            <input id="team1-name" value="Team A">
            <textarea id="team1-players" rows="5" placeholder="Enter players (one per line)">Player 1&#10;Player 2&#10;Player 3&#10;Player 4&#10;Player 5&#10;Player 6&#10;Player 7&#10;Player 8&#10;Player 9&#10;Player 10&#10;Player 11</textarea>
            
            <label>Team 2 (Bowling First)</label>
            <input id="team2-name" value="Team B">
            <textarea id="team2-players" rows="5" placeholder="Enter players (one per line)">Bowler 1&#10;Bowler 2&#10;Bowler 3&#10;Bowler 4&#10;Bowler 5&#10;Bowler 6&#10;Bowler 7&#10;Bowler 8&#10;Bowler 9&#10;Bowler 10&#10;Bowler 11</textarea>
            
            <button class="btn-primary" onclick="startMatch()">START MATCH</button>
        </div>
    </div>

    <div id="game-screen" class="container hidden">
        <div class="card score-box">
            <div id="display-teams" style="font-size: 0.9rem; color: #94a3b8;">Team A vs Team B</div>
            <div class="score-big" id="main-score">0/0</div>
            <div id="display-overs" style="font-weight: bold;">Overs: 0.0 (20.0)</div>
            <div id="crr" style="font-size: 0.8rem; margin-top: 5px;">CRR: 0.00</div>
        </div>

        <div class="card">
            <table>
                <thead><tr><th>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead>
                <tbody id="batting-stats"></tbody>
            </table>
            <div class="btn-grid" style="grid-template-columns: 1fr 1fr;">
                <button class="btn-action" onclick="manualSwap()">SWAP STRIKE</button>
                <button class="btn-action" id="change-bowler-btn" onclick="showPlayerModal('bowler')">CHANGE BOWLER</button>
            </div>
        </div>

        <div class="card">
            <div id="bowler-display" style="margin-bottom: 8px; font-weight: bold;">Bowler: -</div>
            <div class="btn-grid">
                <button class="btn-run" onclick="recordBall({r:0})">0</button>
                <button class="btn-run" onclick="recordBall({r:1})">1</button>
                <button class="btn-run" onclick="recordBall({r:2})">2</button>
                <button class="btn-run" onclick="recordBall({r:3})">3</button>
                <button class="btn-run" onclick="recordBall({r:4})">4</button>
                <button class="btn-run" onclick="recordBall({r:6})">6</button>
                <button class="btn-extra" onclick="recordBall({ex:'wd'})">WD</button>
                <button class="btn-extra" onclick="recordBall({ex:'nb'})">NB</button>
                <button class="btn-extra" onclick="recordBall({ex:'lb'})">LB</button>
                <button class="btn-extra" onclick="recordBall({ex:'b'})">BYE</button>
                <button class="btn-wicket" onclick="handleWicket()">WICKET</button>
                <button class="btn-action" style="grid-column: span 2; background: #475569; color: white;" onclick="undo()">UNDO LAST</button>
            </div>
        </div>

        <div class="card">
            <strong>Ball History</strong>
            <div id="ball-history" class="history"></div>
        </div>
    </div>

    <div id="player-modal" class="hidden" style="position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:1000;">
        <div class="card" style="width: 90%; max-width: 400px;">
            <h3 id="modal-title">Select Player</h3>
            <div id="player-options" style="max-height: 300px; overflow-y: auto;"></div>
            <button class="btn-action" style="width: 100%; margin-top: 10px; background: #475569; color: white;" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        let matchData = { team1: {name: "", players:}, team2: {name: "", players:}, events: };
        let currentStrikerIdx = 0, currentNonStrikerIdx = 1, currentBowler = "", nextBatterIdx = 2, manualStrikeSwap = false;

        function startMatch() {
            matchData.team1.name = document.getElementById('team1-name').value;
            matchData.team1.players = document.getElementById('team1-players').value.split('\n').filter(p => p.trim());
            matchData.team2.name = document.getElementById('team2-name').value;
            matchData.team2.players = document.getElementById('team2-players').value.split('\n').filter(p => p.trim());
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('display-teams').innerText = `${matchData.team1.name} vs ${matchData.team2.name}`;
            
            showPlayerModal('striker');
        }

        function showPlayerModal(type) {
            const modal = document.getElementById('player-modal');
            const list = document.getElementById('player-options');
            const title = document.getElementById('modal-title');
            list.innerHTML = '';
            modal.classList.remove('hidden');

            const players = (type === 'bowler')? matchData.team2.players : matchData.team1.players;
            title.innerText = `Select ${type.toUpperCase()}`;

            players.forEach((p, i) => {
                const btn = document.createElement('button');
                btn.className = 'btn-run';
                btn.style.width = '100%';
                btn.style.margin = '4px 0';
                btn.innerText = p;
                btn.onclick = () => {
                    if(type === 'striker') currentStrikerIdx = i;
                    if(type === 'nonstriker') currentNonStrikerIdx = i;
                    if(type === 'bowler') currentBowler = p;
                    modal.classList.add('hidden');
                    if(type === 'striker') showPlayerModal('nonstriker');
                    else if(type === 'nonstriker') showPlayerModal('bowler');
                    render();
                };
                list.appendChild(btn);
            });
        }

        function recordBall(ball) {
            if(!currentBowler) return alert("Select a bowler first!");
            ball.striker = matchData.team1.players;
            ball.bowler = currentBowler;
            matchData.events.push(ball);
            render();
        }

        function handleWicket() {
            const type = prompt("Wicket Type (Caught, Bowled, LBW, Run Out):", "Caught");
            if(!type) return;
            const event = { w: type, r: 0, striker: matchData.team1.players };
            matchData.events.push(event);
            
            if(nextBatterIdx < matchData.team1.players.length) {
                currentStrikerIdx = nextBatterIdx++;
            }
            render();
        }

        function manualSwap() {
            let temp = currentStrikerIdx;
            currentStrikerIdx = currentNonStrikerIdx;
            currentNonStrikerIdx = temp;
            render();
        }

        function closeModal() { document.getElementById('player-modal').classList.add('hidden'); }
        function undo() { matchData.events.pop(); render(); }

        function render() {
            let s = { runs: 0, wickets: 0, legalBalls: 0, bStats: {} };
            matchData.team1.players.forEach(p => s.bStats[p] = {r:0, b:0, f:0, s:0});
            
            // Re-simulating state from events to handle edits/undos
            let striker = currentStrikerIdx, nonstriker = currentNonStrikerIdx, ballsInOver = 0;

            matchData.events.forEach((e, i) => {
                if(e.ex === 'wd' |

| e.ex === 'nb') {
                    s.runs += 1 + (e.r |

| 0);
                } else {
                    s.runs += (e.r |

| 0);
                    s.legalBalls++;
                    ballsInOver++;
                    s.bStats[e.striker].b++;
                    s.bStats[e.striker].r += (e.r |

| 0);
                    if(e.r === 4) s.bStats[e.striker].f++;
                    if(e.r === 6) s.bStats[e.striker].s++;
                    
                    // Simple run-based rotation
                    if(e.r % 2!== 0) {
                        // In real logic we track current pair, but for this app we'll update global state
                    }
                }
                if(e.w) s.wickets++;
            });

            document.getElementById('main-score').innerText = `${s.runs}/${s.wickets}`;
            document.getElementById('display-overs').innerText = `Overs: ${Math.floor(s.legalBalls/6)}.${s.legalBalls%6} (20.0)`;
            document.getElementById('bowler-display').innerText = `Bowler: ${currentBowler}`;
            
            // UI Updates
            let batHtml = '';
           .forEach((idx, i) => {
                const name = matchData.team1.players[idx];
                const stat = s.bStats[name];
                const sr = stat.b > 0? ((stat.r/stat.b)*100).toFixed(1) : "0.0";
                batHtml += `<tr class="${i === 0? 'striker-row' : ''}"><td>${name}</td><td>${stat.r}</td><td>${stat.b}</td><td>${stat.f}</td><td>${stat.s}</td><td>${sr}</td></tr>`;
            });
            document.getElementById('batting-stats').innerHTML = batHtml;

            let histHtml = '';
            matchData.events.slice().reverse().forEach((e, i) => {
                const res = e.w? 'W' : (e.ex? e.ex.toUpperCase() : e.r);
                histHtml += `<div class="ball-entry"><span>Ball: ${res}</span><span style="color:#94a3b8">${e.striker}</span></div>`;
            });
            document.getElementById('ball-history').innerHTML = histHtml;
        }
    </script>
</body>
</html>
